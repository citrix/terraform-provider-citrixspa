components:
  responses:
    MaskError:
      content: {}
      description: When any error occurs on mask
    ParseError:
      content: {}
      description: When a mask can't be parsed
  schemas:
    Advanced_Settings:
      properties:
        domainOverrides:
          items:
            $ref: '#/components/schemas/Domain_Override'
          type: array
      type: object
    Base_Application_Optional:
      properties:
        agentlessAccess:
          example: true
          type: boolean
        category:
          description: category of this application
          maxLength: 2048
          minLength: 1
          type: string
        createdTime:
          description: Application Created Time
          properties: {}
          type: object
        customProperties:
          example: {}
          properties: {}
          type: object
        customerDomainFields:
          example: {}
          properties: {}
          type: object
        description:
          description: Description of this application
          maxLength: 2048
          minLength: 1
          type: string
        destination:
          example: []
          properties: {}
          type: object
        hidden:
          default: false
          description: Whether to hide the App
          type: boolean
        keywords:
          example: []
          properties: {}
          type: object
        locations:
          description: This parameter is not applicable for hybrid deployments
          items:
            $ref: '#/components/schemas/location'
          maxItems: 100
          type: array
        mobileSecurity:
          example: true
          type: boolean
        name:
          description: Name of this application
          maxLength: 512
          minLength: 1
          type: string
        policies:
          description: This parameter is not applicable for hybrid deployments
          items:
            $ref: '#/components/schemas/new_policy_capability'
          maxItems: 100
          type: array
        policyCount:
          description: Contextual Policy count associated with application
          type: string
        sbsOnlyLaunch:
          example: true
          type: boolean
        type:
          description: Type of application
          enum:
          - web
          - saas
          - ztna
          - sic
          example: web
          type: string
        url:
          description: Application URL
          example: https://sample.com
          type: string
      type: object
    Common_object:
      properties:
        accountName:
          description: Account name
          type: string
        createdTime:
          description: User created time
          type: number
        domainName:
          description: Domain name
          type: string
        duration:
          description: Duration user access will be revoked
          type: integer
        idpType:
          description: Type of IDP
          type: string
        objectId:
          description: OID of the user object
          type: string
      required:
      - accountName
      - idpType
      - objectId
      type: object
    Destination:
      properties:
        destination:
          description: Destination Value shoud be one of the following <hostname |
            ip-range ip>
          type: string
        port:
          description: Port Number for the secureaccess App
          type: string
        protocol:
          description: Protocol for the secureaccess App
          enum:
          - PROTOCOL_TCP
          - PROTOCOL_UDP
          example: PROTOCOL_TCP
          type: string
        routingType:
          description: Routing type for the secureaccess App
          enum:
          - internal
          - external
          example: internal
          type: string
        subtype:
          description: Subtype of secureaccess App
          enum:
          - SUBTYPE_HOSTNAME
          - SUBTYPE_IP_AND_CIDR
          - SUBTYPE_IP_RANGE
          example: SUBTYPE_HOSTNAME
          type: string
      type: object
    Domain_Override:
      properties:
        fqdn:
          type: string
        locationIds:
          items:
            type: string
          maxItems: 2
          type: array
        type:
          type: string
      required:
      - fqdn
      - locationIds
      - type
      type: object
    FQDN_List:
      properties:
